server:
  port: 8083

spring:
  application:
    name: vega-pull-service
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:vega_metadata}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true

# Hadoop HDFS Configuration
hadoop:
  hdfs:
    uri: ${HDFS_URI:hdfs://localhost:9000}
    base-path: /vega/repositories
    replication: ${HDFS_REPLICATION:1}
    block-size: 134217728

# User Service Integration
user-service:
  url: ${USER_SERVICE_URL:http://localhost:8085}
  timeout: 5000

# Push Service Integration
push-service:
  url: ${PUSH_SERVICE_URL:http://localhost:8082}
  timeout: 5000

# Vega Repos — public/private + collaborator rules for pull (RepoAccessService.canAccess)
vega:
  repos-service:
    url: ${VEGA_REPOS_SERVICE_URL:http://localhost:8086}
    # Set false only if Repos is not running (local HDFS-only dev); production must stay true
    require-access-check: ${VEGA_REPOS_PULL_ACCESS_CHECK:true}

# Logging
logging:
  level:
    com.vega: DEBUG
    org.apache.hadoop: WARN
    org.springframework.web: DEBUG

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always




