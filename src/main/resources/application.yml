server:
  port: 8083

spring:
  application:
    name: vega-pull-service
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:vega_metadata}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true

# Hadoop HDFS Configuration
hadoop:
  hdfs:
    uri: hdfs://localhost:9000
    base-path: /vega/repositories
    replication: 3
    block-size: 134217728 # 128MB

# User Service Integration
user-service:
  url: http://localhost:8085
  timeout: 5000

# Push Service Integration
push-service:
  url: http://localhost:8082
  timeout: 5000

# Logging
logging:
  level:
    com.vega: DEBUG
    org.apache.hadoop: WARN
    org.springframework.web: DEBUG

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always




